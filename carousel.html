<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px}
  body{font-family:"Heebo",sans-serif}
  body:not(.solo){background:#333}
  body.solo .slide{display:none}
  body.solo .slide.on{display:block}

  .slide{position:relative;width:1080px;height:1350px;overflow:hidden;background:#08080C;color:#F6F6FA;
    font-family:"Heebo",sans-serif;--pink:#FF1FA0;--blue:#3170FF;--base:#08080C;--ink:#F6F6FA;--mut:#9A9AB0}

  .grain{position:absolute;inset:0;z-index:8;opacity:.06;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>")}
  .frame{position:absolute;inset:26px;z-index:9;border-radius:30px;pointer-events:none;border:1.5px solid rgba(246,246,250,.16)}
  .glow{position:absolute;z-index:1;border-radius:50%;filter:blur(110px);pointer-events:none;opacity:.5}
  .glow.p{background:var(--pink)} .glow.b{background:var(--blue)}

  .chip{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:9;background:#fff;border-radius:100px;
    padding:14px 30px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .chip img{height:40px;width:auto;display:block}

  .foot{position:absolute;left:70px;right:70px;bottom:64px;z-index:9;display:flex;align-items:center;justify-content:space-between;color:var(--ink)}
  .save{display:flex;align-items:center;gap:11px;font-weight:700;font-size:25px;opacity:.92}
  .save svg{width:29px;height:29px}
  .hand{display:flex;align-items:center;gap:12px;font-family:"Space Mono",monospace;font-weight:700;font-size:24px;opacity:.92;direction:ltr;unicode-bidi:isolate}
  .igm{width:36px;height:36px;border-radius:10px;border:2.5px solid currentColor;position:relative;flex:none}
  .igm::before{content:"";position:absolute;inset:8px;border:2.5px solid currentColor;border-radius:50%}
  .igm::after{content:"";position:absolute;top:6px;right:6px;width:5px;height:5px;border-radius:50%;background:currentColor}
  .dots{position:absolute;left:0;right:0;bottom:36px;z-index:9;display:flex;gap:8px;justify-content:center}
  .dots i{width:7px;height:7px;border-radius:50%;background:rgba(246,246,250,.3)}
  .dots i.on{width:30px;border-radius:4px;background:linear-gradient(90deg,var(--pink),var(--blue))}

  .hl{position:absolute;z-index:7;left:74px;right:74px;font-weight:900;line-height:.97;letter-spacing:-.02em;color:#fff;text-shadow:0 4px 40px rgba(0,0,0,.55)}
  .hl .p,.hl mark{color:var(--pink);background:transparent}
  .hl .grad{background:linear-gradient(96deg,var(--pink),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent}
  .kick{position:absolute;z-index:7;font-family:"Space Mono",monospace;font-weight:700;font-size:23px;letter-spacing:.24em;text-transform:uppercase;color:var(--pink)}
  .sub{position:absolute;z-index:7;font-weight:500;font-size:38px;line-height:1.42;color:#D6D6E2}
  .sub b{color:#fff;font-weight:800}
  .bar{position:absolute;z-index:7;height:7px;width:118px;border-radius:6px;background:linear-gradient(90deg,var(--pink),var(--blue));box-shadow:0 0 26px rgba(255,31,160,.6)}

  /* COVER */
  .cover .hero{position:absolute;inset:0;z-index:1;background-size:cover;background-position:50% 24%;filter:contrast(1.06) saturate(1.08)}
  .cover .heroph{position:absolute;inset:0;z-index:1;background:radial-gradient(120% 80% at 70% 25%,rgba(255,31,160,.5),transparent 55%),radial-gradient(120% 80% at 20% 75%,rgba(49,112,255,.5),transparent 55%),#0c0c12}
  .cover .scrim{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,rgba(8,8,12,.55) 0%,rgba(8,8,12,0) 24%,rgba(8,8,12,.1) 50%,rgba(8,8,12,.76) 80%,var(--base) 99%)}
  .cover .kick{left:74px;bottom:560px} .cover .bar{left:74px;bottom:512px}
  .cover .hl{bottom:296px;font-size:120px}
  .cover .sub{left:74px;right:150px;bottom:172px;text-align:right}

  /* CONTENT */
  .content .num{position:absolute;z-index:7;right:74px;top:150px;font-weight:900;font-size:148px;line-height:1;
    background:linear-gradient(150deg,var(--pink),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent}
  .content .kick{right:78px;top:344px}
  .content .hl{top:402px;font-size:92px;text-align:right;right:78px;left:74px}
  .content .bar{right:78px;top:absolute}
  .content .sub{right:78px;left:90px;text-align:right}
  .content .thumb{position:absolute;z-index:6;left:74px;bottom:150px;width:932px;height:352px;border-radius:24px;overflow:hidden;border:1.5px solid rgba(246,246,250,.14);box-shadow:0 30px 60px rgba(0,0,0,.5)}
  .content .thumb .img{position:absolute;inset:0;background-size:cover;background-position:50% 26%;filter:contrast(1.05) saturate(1.06)}
  .content .thumb .imgph{position:absolute;inset:0;background:radial-gradient(100% 120% at 80% 20%,rgba(255,31,160,.45),transparent 60%),radial-gradient(100% 120% at 10% 90%,rgba(49,112,255,.45),transparent 60%),#0c0c12}
  .content .thumb .sh{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,8,12,.5),transparent 55%)}

  /* CTA */
  .cta .lab{position:absolute;z-index:7;left:0;right:0;top:300px;text-align:center;font-weight:700;font-size:52px;color:#fff}
  .cta .kw{position:absolute;z-index:7;left:40px;right:40px;top:362px;text-align:center;font-weight:900;font-size:200px;letter-spacing:-.03em;line-height:.95;
    background:linear-gradient(96deg,var(--pink),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 50px rgba(255,31,160,.4))}
  .cta .sub{left:120px;right:120px;top:660px;text-align:center}
  .cta .pillbtn{position:absolute;z-index:7;left:50%;top:850px;transform:translateX(-50%);background:linear-gradient(96deg,var(--pink),var(--blue));color:#fff;font-weight:900;font-size:44px;padding:25px 66px;border-radius:100px;box-shadow:0 20px 50px rgba(255,31,160,.4)}

  [dir=ltr] .hand,[dir=ltr] .kick{direction:ltr}
  [dir=ltr] .cover .sub,[dir=ltr] .content .hl,[dir=ltr] .content .sub{text-align:left}
</style>
</head>
<body>
<script id="data" type="application/json">{"theme":"t-ink","brand":{"handle":"@bankhaltershay"},"slides":[]}</script>
<div id="root"></div>
<script>
  (function(){
    var D=JSON.parse(document.getElementById('data').textContent);
    var B=D.brand||{},S=D.slides||[],N=S.length,bg=D.bg||'';
    var EN=(D.lang==='en');
    if(EN){document.documentElement.setAttribute('dir','ltr');document.documentElement.setAttribute('lang','en');}
    var HANDLE=B.handle||'@bankhaltershay';
    var LOGO='https://res.cloudinary.com/duhfkgxer/image/upload/pink_carousel/pink_logo_main.png';
    var SAVE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
    var pad=function(n){return (n<10?'0':'')+n;};
    function chip(){return '<div class="chip"><img src="'+LOGO+'" alt="Pink Media"></div>';}
    function foot(i){var d='';for(var k=0;k<N;k++)d+='<i class="'+(k===i?'on':'')+'"></i>';
      return '<div class="foot"><div class="hand"><span class="igm"></span>'+HANDLE+'</div>'
        +'<div class="save">'+SAVE+(EN?'SAVE FOR LATER':'שמרו לאחר כך')+'</div></div><div class="dots">'+d+'</div>';}
    var heroLayer=bg?('<div class="hero" style="background-image:url(\''+bg+'\')"></div>'):'<div class="heroph"></div>';
    var thumbLayer=bg?('<div class="img" style="background-image:url(\''+bg+'\')"></div>'):'<div class="imgph"></div>';

    var root=document.getElementById('root'),cnum=0;
    S.forEach(function(s,i){
      var n=i+1,div=document.createElement('div'),inner='';
      div.id='s'+n;
      if(s.type==='cta'){
        div.className='slide cta';
        var kw=s.pill||(EN?'GUIDE':'מדריך');
        var note=s.sub||(EN?'Comment "'+kw+'" and I send it to your DM':'תגיבו "'+kw+'" ואני שולח לכם אותו ישר ל-DM');
        inner='<div class="glow p" style="width:680px;height:680px;top:120px;left:50%;transform:translateX(-50%)"></div>'
          +'<div class="glow b" style="width:520px;height:520px;bottom:-120px;right:-100px"></div><div class="grain"></div>'+chip()
          +'<div class="lab">'+(EN?'Comment':'תגיבו')+'</div><div class="kw">'+kw+'</div>'
          +'<div class="sub">'+note+'</div>'
          +'<div class="pillbtn">'+(EN?'send me':'שלחו לי')+'</div>'
          +'<div class="frame"></div>'+foot(i);
      } else if(s.type==='hook'){
        div.className='slide cover';
        inner=heroLayer+'<div class="scrim"></div><div class="grain"></div>'+chip()
          +(s.kicker?'<div class="kick">'+s.kicker+'</div>':'<div class="kick">'+(EN?'AI · MARKETING':'AI · שיווק')+'</div>')+'<div class="bar"></div>'
          +'<div class="hl">'+(s.h||'')+'</div>'
          +(s.sub?'<div class="sub">'+s.sub+'</div>':'')
          +'<div class="frame"></div>'+foot(i);
      } else {
        cnum++;
        div.className='slide content';
        inner='<div class="glow p" style="width:520px;height:520px;top:-160px;right:-120px"></div>'
          +'<div class="glow b" style="width:560px;height:560px;bottom:-200px;left:-160px"></div><div class="grain"></div>'+chip()
          +'<div class="num">'+pad(cnum)+'</div>'
          +(s.kicker?'<div class="kick">'+s.kicker+'</div>':'')
          +'<div class="hl">'+(s.h||'')+'</div>'
          +'<div class="bar" style="top:662px"></div>'
          +(s.sub?'<div class="sub" style="top:722px">'+s.sub+'</div>':'')
          +'<div class="thumb">'+thumbLayer+'<div class="sh"></div></div>'
          +'<div class="frame"></div>'+foot(i);
      }
      div.innerHTML=inner;root.appendChild(div);
    });

    var hsh=location.hash.replace('#','');
    if(hsh){document.body.classList.add('solo');var el=document.getElementById(hsh);if(el)el.classList.add('on');}
    function fit(){document.querySelectorAll('.hl').forEach(function(h){
      var sz=parseFloat(getComputedStyle(h).fontSize),g=0;
      while(g++<160 && sz>42 && (h.scrollWidth>h.clientWidth+1)){sz-=3;h.style.fontSize=sz+'px';}});}
    if(document.fonts&&document.fonts.ready){document.fonts.ready.then(fit);}else{fit();}
  })();
</script>
</body>
</html>
