<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px}
  body{font-family:"Heebo",sans-serif}
  body:not(.solo){background:#333}
  body.solo .slide{display:none}
  body.solo .slide.on{display:flex}

  /* dark-only collage palettes (neon hit rotates daily, wide variety) */
  .t-ink{--base:#0B0A0E;--ink:#FFFFFF;--hit:#FF2E88}
  .t-cream{--base:#0C0D07;--ink:#F5FFE8;--hit:#C6FF1E}
  .t-acid{--base:#080A14;--ink:#EAFBFF;--hit:#27E5FF}
  .t-blue{--base:#04141A;--ink:#E9FFF8;--hit:#00E5A0}
  .t-sun{--base:#120A06;--ink:#FFF0E0;--hit:#FF8A1E}
  .t-grape{--base:#0E0716;--ink:#F3E9FF;--hit:#B57BFF}
  .t-fire{--base:#140706;--ink:#FFEDE9;--hit:#FF4D3D}
  .t-cobalt{--base:#060A18;--ink:#E8EEFF;--hit:#4D7CFF}
  .t-gold{--base:#0F0C04;--ink:#FFF6E0;--hit:#FFD23D}

  .slide{position:relative;width:1080px;height:1350px;overflow:hidden;display:flex;flex-direction:column;
    background:var(--base);color:var(--ink);font-family:"Heebo",sans-serif}
  .slide::before{content:"";position:absolute;inset:30px;border:2px dashed var(--ink);opacity:.28;z-index:5;pointer-events:none}
  .grain{position:absolute;inset:0;z-index:1;opacity:.08;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='2'/></filter><rect width='220' height='220' filter='url(%23n)'/></svg>")}
  .halftone{position:absolute;width:560px;height:560px;right:-160px;bottom:-170px;z-index:1;opacity:.42;
    background-image:radial-gradient(var(--hit) 31%,transparent 32%);background-size:30px 30px;
    -webkit-mask-image:linear-gradient(225deg,#000,transparent 72%)}
  .idx{position:absolute;left:40px;top:200px;z-index:1;font-family:"Space Mono",monospace;font-weight:700;
    font-size:540px;line-height:1;color:transparent;-webkit-text-stroke:3px var(--hit);opacity:.07;user-select:none}

  /* header */
  .top{position:relative;z-index:6;display:flex;justify-content:space-between;align-items:flex-start;padding:70px 70px 0}
  .kick{display:inline-block;background:var(--ink);color:var(--base);font-family:"Space Mono",monospace;
    font-weight:700;font-size:23px;letter-spacing:.16em;text-transform:uppercase;padding:11px 20px;transform:rotate(-2deg)}
  .pg{font-family:"Space Mono",monospace;font-weight:700;font-size:26px;background:var(--hit);color:var(--base);
    padding:9px 15px;transform:rotate(3deg);direction:ltr;unicode-bidi:isolate}

  /* hero photo collage band */
  .stage{position:relative;z-index:4;flex:0 0 560px;margin:34px 0 6px}
  .block{position:absolute;width:600px;height:470px;top:46px;right:118px;background:var(--hit);transform:rotate(3.5deg);z-index:1}
  .photo{position:absolute;top:14px;right:172px;width:600px;height:470px;z-index:2;border:9px solid var(--ink);
    box-shadow:16px 18px 0 rgba(0,0,0,.5);transform:rotate(-2.5deg);background:#000;overflow:hidden}
  .photo .img{position:absolute;inset:0;background-size:cover;background-position:center;
    filter:grayscale(1) contrast(1.12) brightness(1.05)}
  .photo .duo{position:absolute;inset:0;background:var(--hit);mix-blend-mode:multiply;opacity:.5}
  .photo .duo2{position:absolute;inset:0;background:var(--base);mix-blend-mode:soft-light;opacity:.4}
  .photo.empty{display:flex;align-items:center;justify-content:center;background:var(--hit)}
  .photo.empty b{font-family:"Space Mono",monospace;font-size:300px;color:var(--base);opacity:.25}
  /* real stock photo: natural, authentic, not stylized */
  .photo.real .duo{opacity:.12}
  .photo.real .duo2{opacity:.16;mix-blend-mode:normal;background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.45))}
  .photo.real .img{filter:grayscale(0) contrast(1.05) saturate(1.06) brightness(1)}
  .tape{position:absolute;z-index:3;width:190px;height:52px;background:rgba(255,255,255,.28);transform:rotate(-22deg);
    top:8px;right:230px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .stamp{position:absolute;z-index:4;left:96px;top:330px;width:208px;height:208px;border:5px solid var(--hit);
    border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(-12deg);
    color:var(--hit);font-family:"Space Mono",monospace;font-weight:700;font-size:30px;letter-spacing:.05em;text-align:center}
  .stamp::after{content:"";position:absolute;inset:13px;border:2px dashed var(--hit);border-radius:50%;opacity:.65}

  /* text band */
  .body{position:relative;z-index:6;flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 74px}
  .eyebrow{display:inline-block;align-self:flex-start;font-weight:900;font-size:30px;color:var(--base);
    background:var(--hit);padding:8px 18px;transform:rotate(-1.5deg);margin-bottom:24px}
  h1,h2{font-weight:900;color:var(--ink);line-height:1.0;letter-spacing:-.02em}
  h1{font-size:120px}
  h2{font-size:90px}
  mark{background:var(--hit);color:var(--base);padding:.02em .08em;box-decoration-break:clone;
    -webkit-box-decoration-break:clone;display:inline-block;transform:skewX(-6deg)}
  .sub{margin-top:28px;font-size:42px;font-weight:700;color:var(--ink);line-height:1.34;max-width:920px;
    border-right:9px solid var(--hit);padding-right:22px;opacity:.95}
  .pill{display:inline-block;align-self:flex-start;margin-top:38px;background:var(--hit);color:var(--base);
    font-size:46px;font-weight:900;padding:26px 52px;transform:rotate(-2deg);box-shadow:12px 12px 0 rgba(0,0,0,.45)}

  /* footer sticker bar */
  .foot{position:relative;z-index:6;display:flex;justify-content:space-between;align-items:center;
    background:var(--ink);color:var(--base);padding:24px 70px;margin-top:34px}
  .brand{display:flex;align-items:center;gap:14px;font-size:30px;font-weight:900}
  .brand .handle{direction:ltr;unicode-bidi:isolate}
  .brand small{display:block;font-size:17px;font-weight:700;opacity:.65;font-family:"Space Mono",monospace}
  .dot{width:22px;height:22px;background:var(--hit);transform:rotate(45deg)}
  .logo{height:60px;width:auto;display:block}
  .swipehint{position:relative;z-index:6;display:flex;justify-content:flex-end;align-items:center;gap:10px;
    padding:6px 78px 16px;font-family:"Space Mono",monospace;font-weight:700;font-size:25px;color:var(--ink);opacity:.72}
  .swipehint .a{color:var(--hit);font-size:32px}

  /* CTA: dark + loud (no photo, but full collage energy) */
  .slide.cta .stage{flex:0 0 250px}
  .slide.cta .body{justify-content:flex-start}
  .slide.cta h1{font-size:150px}
  .slide.cta .idx{opacity:.1;font-size:620px;top:120px}
</style>
</head>
<body>
<script id="data" type="application/json">{"theme":"t-ink","brand":{"handle":"@bankhaltershay","sub":"PINK MEDIA"},"slides":[]}</script>
<div id="root"></div>
<script>
  (function(){
    var D=JSON.parse(document.getElementById('data').textContent);
    var THEMES=['t-ink','t-cream','t-acid','t-blue','t-sun','t-grape','t-fire','t-cobalt','t-gold'];
    var theme=THEMES.indexOf(D.theme)>=0?D.theme:'t-ink';
    var B=D.brand||{},S=D.slides||[],N=S.length,bg=D.bg||'';
    var real=D.bgreal?' real':'';
    var LOGO='https://res.cloudinary.com/duhfkgxer/image/upload/pink_carousel/pink_logo_main.png';
    var pad=function(n){return (n<10?'0':'')+n;};
    var STAMP=['HOT TAKE','תובנה','המהלך','דחוף','עכשיו','PINK'];
    var root=document.getElementById('root');
    S.forEach(function(s,i){
      var n=i+1,isCta=s.type==='cta',big=(s.type==='hook'||isCta);
      var div=document.createElement('div');
      div.className='slide '+theme+(isCta?' cta':'');
      div.id='s'+n;
      var photo = bg
        ? '<div class="block"></div><div class="photo'+real+'"><div class="img" style="background-image:url(\''+bg+'\')"></div><div class="duo"></div><div class="duo2"></div></div><div class="tape"></div>'
        : '<div class="block"></div><div class="photo empty"><b>'+pad(n)+'</b></div><div class="tape"></div>';
      div.innerHTML =
        '<div class="grain"></div><div class="halftone"></div><div class="idx">'+pad(n)+'</div>'
        + '<div class="top"><div class="kick">'+(s.kicker||B.sub||'PINK MEDIA')+'</div>'
        + '<div class="pg"><b>'+pad(n)+'</b> / '+pad(N)+'</div></div>'
        + '<div class="stage">'+(isCta?'':photo)+(isCta?'':'<div class="stamp">'+STAMP[i%STAMP.length]+'</div>')+'</div>'
        + '<div class="body">'
        + (s.eyebrow?'<span class="eyebrow">'+s.eyebrow+'</span>':'')
        + '<'+(big?'h1':'h2')+'>'+(s.h||'')+'</'+(big?'h1':'h2')+'>'
        + (s.sub?'<div class="sub">'+s.sub+'</div>':'')
        + (isCta&&s.pill?'<span class="pill">'+s.pill+'</span>':'')
        + '</div>'
        + (!isCta&&n<N?'<div class="swipehint">החליקו<span class="a">&#8592;</span></div>':'')
        + '<div class="foot"><div class="brand"><span class="dot"></span>'
        + '<div><span class="handle">'+(B.handle||'@bankhaltershay')+'</span>'
        + '<small>'+(B.sub||'PINK MEDIA')+'</small></div></div>'
        + '<img class="logo" src="'+LOGO+'" alt="Pink">'
        + '</div>';
      root.appendChild(div);
    });
    var hsh=location.hash.replace('#','');
    if(hsh){document.body.classList.add('solo');var el=document.getElementById(hsh);if(el)el.classList.add('on');}
    function fit(){
      document.querySelectorAll('.slide').forEach(function(sl){
        if(sl.offsetParent===null) return;
        var head=sl.querySelector('h1,h2'), body=sl.querySelector('.body');
        if(!head||!body) return;
        var sz=parseFloat(getComputedStyle(head).fontSize), g=0;
        while(g++<140 && sz>44 && (head.scrollWidth>head.clientWidth+1 || body.scrollHeight>body.clientHeight+1)){ sz-=3; head.style.fontSize=sz+'px'; }
        var sub=sl.querySelector('.sub'), s2=0;
        if(sub){ var ss=parseFloat(getComputedStyle(sub).fontSize);
          while(s2++<60 && ss>22 && body.scrollHeight>body.clientHeight+1){ ss-=2; sub.style.fontSize=ss+'px'; } }
      });
    }
    if(document.fonts&&document.fonts.ready){document.fonts.ready.then(fit);}else{fit();}
  })();
</script>
</body>
</html>
