<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px}
  body{font-family:"Heebo",sans-serif}
  body:not(.solo){background:#333}
  body.solo .slide{display:none}
  body.solo .slide.on{display:block}

  .slide{position:relative;width:1080px;height:1350px;overflow:hidden;font-family:"Heebo",sans-serif;
    --pink:#FE00A3;--blue:#1240E8;--ink:#0F0F12;--paper:#FFFFFF;--grey:#9A9AA2}

  /* top handle */
  .top{position:absolute;top:58px;left:0;right:0;z-index:9;text-align:center;
    font-family:"Space Mono",monospace;font-weight:700;font-size:24px;color:var(--grey);direction:ltr;unicode-bidi:isolate}
  .top b{color:var(--ink)}

  /* footer */
  .foot{position:absolute;left:64px;right:64px;bottom:52px;z-index:9;display:flex;align-items:center;justify-content:space-between}
  .save{display:flex;align-items:center;gap:12px;font-weight:800;font-size:26px}
  .save svg{width:30px;height:30px}
  .ig{display:flex;align-items:center;gap:13px;font-family:"Space Mono",monospace;font-weight:700;font-size:24px;direction:ltr;unicode-bidi:isolate}
  .igm{width:38px;height:38px;border-radius:11px;border:3px solid currentColor;position:relative;flex:none}
  .igm::before{content:"";position:absolute;inset:8px;border:3px solid currentColor;border-radius:50%}
  .igm::after{content:"";position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:currentColor}
  .dots{position:absolute;left:0;right:0;bottom:28px;z-index:9;display:flex;gap:9px;justify-content:center}
  .dots i{width:8px;height:8px;border-radius:50%;background:var(--grey);opacity:.4}
  .dots i.on{opacity:1;width:26px;border-radius:5px;background:var(--pink)}

  /* ultra-heavy multi-color headline */
  .hl{position:absolute;z-index:7;left:70px;right:70px;font-weight:900;line-height:.93;
    letter-spacing:-.03em;text-align:center;color:var(--ink);-webkit-text-stroke:1.5px var(--ink)}
  .hl .l{display:block}
  .hl .c1,.hl mark{color:var(--pink);-webkit-text-stroke-color:var(--pink);background:transparent}
  .hl .c2{color:var(--grey);-webkit-text-stroke-color:var(--grey)}
  .sub{position:absolute;z-index:7;left:100px;right:100px;text-align:center;font-weight:700;font-size:40px;line-height:1.4;color:var(--ink)}
  .sub b{color:var(--pink)}

  .burst{position:absolute;z-index:5;pointer-events:none;filter:drop-shadow(0 16px 28px rgba(254,0,163,.26))}

  /* WHITE poster (cover + content) */
  .poster{background:var(--paper)}
  .poster .save,.poster .ig{color:var(--ink)}

  /* COMMENT CTA */
  .cta{background:var(--paper)}
  .cta .lab{position:absolute;z-index:7;left:0;right:0;top:210px;text-align:center;font-weight:800;font-size:60px;color:var(--ink)}
  .cta .kw{position:absolute;z-index:7;left:40px;right:40px;top:280px;text-align:center;font-weight:900;font-size:190px;
    color:var(--pink);-webkit-text-stroke:3px var(--pink);letter-spacing:-.03em;line-height:.95}
  .cta .sub{top:560px}
  .cta .burst{left:50%;top:790px;transform:translate(-50%,-50%)}
  .cta .btn{position:absolute;z-index:7;left:50%;top:1000px;transform:translateX(-50%);width:118px;height:118px;
    border-radius:50%;border:7px solid var(--pink);background:#fff}
  .cta .save,.cta .ig{color:var(--ink)}

  /* English LTR */
  [dir=ltr] .top,[dir=ltr] .ig{direction:ltr}
  [dir=ltr] .cta .lab{direction:ltr}
</style>
</head>
<body>
<script id="data" type="application/json">{"theme":"t-ink","brand":{"handle":"@bankhaltershay"},"slides":[]}</script>
<div id="root"></div>
<script>
  (function(){
    var D=JSON.parse(document.getElementById('data').textContent);
    var B=D.brand||{},S=D.slides||[],N=S.length;
    var EN=(D.lang==='en');
    if(EN){document.documentElement.setAttribute('dir','ltr');document.documentElement.setAttribute('lang','en');}
    var HANDLE=B.handle||'@bankhaltershay';
    function burst(size){var cx=size/2,cy=size/2,rO=size/2,rM=size*0.34,rI=size*0.14,p=[],q=[],spikes=14;
      for(var i=0;i<spikes*2;i++){var r=(i%2===0)?rO:rM;var a=(Math.PI/spikes)*i-Math.PI/2;p.push((cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1));}
      for(var j=0;j<10;j++){var r2=(j%2===0)?rM*0.8:rI;var a2=(Math.PI/5)*j-Math.PI/2;q.push((cx+r2*Math.cos(a2)).toFixed(1)+","+(cy+r2*Math.sin(a2)).toFixed(1));}
      return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><defs><linearGradient id="g'+size+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FE00A3"/><stop offset="1" stop-color="#FF5FC4"/></linearGradient></defs><polygon points="'+p.join(' ')+'" fill="url(#g'+size+')"/><polygon points="'+q.join(' ')+'" fill="#1240E8"/></svg>';}
    var SAVE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
    function topbar(){return '<div class="top"><b>'+HANDLE+'</b> | '+(EN?'Pink Media':'פינק מדיה')+'</div>';}
    function foot(i){var d='';for(var k=0;k<N;k++)d+='<i class="'+(k===i?'on':'')+'"></i>';
      return '<div class="foot"><div class="ig"><span class="igm"></span>'+HANDLE+'</div>'
        +'<div class="save">'+SAVE+(EN?'SAVE FOR LATER':'שמרו לאחר כך')+'</div></div><div class="dots">'+d+'</div>';}
    // heavy multi-color headline: split into lines (white/pink/grey), leading number + <mark> pink
    function hl(h){var lines=String(h||'').split('\n').map(function(x){return x.trim();}).filter(Boolean);
      if(lines.length===1){var w=lines[0].split(' ');if(w.length>=4){var per=Math.ceil(w.length/(w.length>7?3:2)),out=[];for(var j=0;j<w.length;j+=per)out.push(w.slice(j,j+per).join(' '));lines=out;}}
      return lines.map(function(t,ix){
        var hasMark=/<mark>/.test(t);
        var cls=(ix===1&&!hasMark)?'l c1':(ix===2&&!hasMark?'l c2':'l');
        // color a leading number pink when the line itself is not already accented
        if(cls==='l') t=t.replace(/^(\s*<mark>[\s\S]*?<\/mark>|\s*\d+[%+]?)/,function(m){return /mark/.test(m)?m:'<mark>'+m.trim()+'</mark>';});
        return '<span class="'+cls+'">'+t+'</span>';
      }).join('');}

    var root=document.getElementById('root');
    S.forEach(function(s,i){
      var n=i+1,div=document.createElement('div'),inner='';
      div.id='s'+n;
      if(s.type==='cta'){
        div.className='slide cta';
        var kw=s.pill||(EN?'GUIDE':'מדריך');
        var note=s.sub||(EN?'Comment "'+kw+'" and I send it to your DM':'תגיבו "'+kw+'" ואני שולח לכם אותו ישר ל-DM');
        inner=topbar()+'<div class="lab">'+(EN?'Comment':'תגיבו')+'</div>'
          +'<div class="kw">"'+kw+'"</div>'
          +'<div class="sub">'+note+'</div>'
          +'<div class="burst" style="width:230px;height:230px">'+burst(230)+'</div>'
          +'<div class="btn"></div>'+foot(i);
      } else {
        var isHook=(s.type==='hook');
        div.className='slide poster';
        inner=topbar()
          +'<div class="hl" style="top:'+(isHook?'220':'250')+'px;font-size:'+(isHook?'168':'130')+'px">'+hl(s.h)+'</div>'
          +(s.sub?'<div class="sub" style="top:'+(isHook?'1110':'860')+'px">'+s.sub+'</div>':'')
          +(isHook?'<div class="burst" style="left:50%;top:1010px;transform:translate(-50%,-50%);width:170px;height:170px">'+burst(170)+'</div>':'')
          +foot(i);
      }
      div.innerHTML=inner;root.appendChild(div);
    });

    var hsh=location.hash.replace('#','');
    if(hsh){document.body.classList.add('solo');var el=document.getElementById(hsh);if(el)el.classList.add('on');}
    function fit(){document.querySelectorAll('.slide').forEach(function(sl){
      var h=sl.querySelector('.hl');if(!h)return;
      var sz=parseFloat(getComputedStyle(h).fontSize),g=0;
      while(g++<170 && sz>40 && (h.scrollWidth>h.clientWidth+1 || h.scrollHeight>h.offsetHeight+1 && h.scrollHeight>520)){sz-=3;h.style.fontSize=sz+'px';}
    });}
    if(document.fonts&&document.fonts.ready){document.fonts.ready.then(fit);}else{fit();}
  })();
</script>
</body>
</html>
