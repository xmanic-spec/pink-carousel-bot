<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1920px;overflow:hidden;background:#000}
  body{font-family:"Heebo",sans-serif}
  /* dark neon palettes (same as carousel for brand parity) */
  .t-ink{--base:#0B0A0E;--ink:#FFFFFF;--hit:#FF2E88}
  .t-cream{--base:#0C0D07;--ink:#F5FFE8;--hit:#C6FF1E}
  .t-acid{--base:#080A14;--ink:#EAFBFF;--hit:#27E5FF}
  .t-blue{--base:#04141A;--ink:#E9FFF8;--hit:#00E5A0}
  .t-sun{--base:#120A06;--ink:#FFF0E0;--hit:#FF8A1E}
  .t-grape{--base:#0E0716;--ink:#F3E9FF;--hit:#B57BFF}
  .t-fire{--base:#140706;--ink:#FFEDE9;--hit:#FF4D3D}
  .t-cobalt{--base:#060A18;--ink:#E8EEFF;--hit:#4D7CFF}
  .t-gold{--base:#0F0C04;--ink:#FFF6E0;--hit:#FFD23D}

  .r{position:relative;width:1080px;height:1920px;overflow:hidden;background:var(--base);color:var(--ink)}
  .bg{position:absolute;inset:0;z-index:1;overflow:hidden}
  .bg .img{position:absolute;inset:-30px;background-size:cover;background-position:center;
    filter:contrast(1.08) saturate(1.12) brightness(1.02);
    animation:kb 10s linear both}
  @keyframes kb{0%{transform:scale(1.04)}100%{transform:scale(1.14)}}
  .bg .tint{position:absolute;inset:0;background:var(--hit);mix-blend-mode:overlay;opacity:.15}
  .bg .grade{position:absolute;inset:0;background:radial-gradient(120% 80% at 50% 30%,transparent 38%,rgba(0,0,0,.55) 100%)}
  .scrim{position:absolute;inset:0;z-index:2;background:
    linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.1) 22%,rgba(0,0,0,.1) 60%,rgba(0,0,0,.78) 92%,var(--base) 100%);
    pointer-events:none}

  /* zine frame (matches carousel identity) */
  .frame{position:absolute;inset:36px;border:3px dashed var(--ink);opacity:.22;z-index:9;pointer-events:none}
  .grain{position:absolute;inset:0;z-index:8;opacity:.07;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='2'/></filter><rect width='220' height='220' filter='url(%23n)'/></svg>")}

  /* top kicker chip — sits below the IG safe-area for username (~250px) */
  .kicker{position:absolute;top:260px;left:0;right:0;z-index:10;display:flex;justify-content:center;
    animation:popIn .6s .15s ease-out both}
  .kicker b{background:var(--ink);color:var(--base);font-family:"Space Mono",monospace;font-weight:700;
    font-size:34px;letter-spacing:.15em;text-transform:uppercase;padding:14px 26px;transform:rotate(-1.5deg)}

  /* scene base */
  .scene{position:absolute;left:60px;right:60px;z-index:10;opacity:0;text-align:center;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  @keyframes fadeIn{0%{opacity:0;transform:translateY(28px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes fadeOut{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-18px)}}

  /* fadeOut uses 'forwards' (not 'both') so its backwards-fill cannot leak opacity:1
     into the prior delay window and reveal a later scene before its own fadeIn runs. */
  .scene1{top:480px;height:900px;animation:fadeIn .45s .55s ease-out both,fadeOut .35s 3.3s ease-in forwards}
  .scene1 h1{font-weight:900;font-size:150px;line-height:.98;letter-spacing:-.025em;
    text-shadow:0 4px 30px rgba(0,0,0,.7)}
  .scene1 .sticker{margin-top:38px;display:inline-block;background:var(--hit);color:var(--base);
    font-family:"Space Mono",monospace;font-weight:700;font-size:38px;letter-spacing:.1em;
    padding:14px 26px;transform:rotate(-2deg);text-transform:uppercase}

  .scene2{top:520px;height:880px;animation:fadeIn .4s 3.75s ease-out both,fadeOut .35s 6.85s ease-in forwards}
  .scene2 .eb{display:inline-block;background:var(--hit);color:var(--base);font-weight:900;
    font-size:46px;padding:14px 26px;transform:rotate(-1.5deg);margin-bottom:34px}
  .scene2 h2{font-weight:900;font-size:110px;line-height:1.02;letter-spacing:-.02em;
    text-shadow:0 4px 24px rgba(0,0,0,.7)}

  .scene3{top:540px;height:880px;animation:fadeIn .45s 7.1s ease-out both}
  .scene3 .swipe{font-weight:900;font-size:110px;color:var(--ink);line-height:1;
    text-shadow:0 4px 22px rgba(0,0,0,.7);margin-bottom:30px}
  .scene3 .arrow{font-family:"Space Mono",monospace;font-size:200px;color:var(--hit);line-height:.8;
    margin:8px 0 28px;animation:wiggle 1.4s 7.7s infinite ease-in-out}
  @keyframes wiggle{0%,100%{transform:translateX(0)}50%{transform:translateX(-22px)}}
  .scene3 .handle{display:inline-block;background:var(--ink);color:var(--base);font-weight:900;
    font-size:60px;padding:18px 36px;direction:ltr;unicode-bidi:isolate;letter-spacing:-.01em}

  /* persistent footer brand bar — above IG bottom safe area (~380px) */
  .footbar{position:absolute;bottom:420px;left:0;right:0;z-index:10;display:flex;
    justify-content:center;align-items:center;gap:18px;opacity:0;animation:popIn .5s .2s ease-out both}
  .footbar .dot{width:24px;height:24px;background:var(--hit);transform:rotate(45deg)}
  .footbar .b{font-weight:900;font-size:36px;color:var(--ink);text-shadow:0 2px 12px rgba(0,0,0,.7)}
  @keyframes popIn{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
</style>
</head>
<body class="t-blue">
<script id="data" type="application/json">{"theme":"t-blue","bg":"","kicker":"PINK MEDIA","hookH":"","hookSticker":"HOT TAKE","punchEb":"","punchH":"","swipe":"החליקו לקרוסלה","handle":"@bankhaltershay"}</script>
<div class="r">
  <div class="bg"><div class="img"></div><div class="tint"></div><div class="grade"></div></div>
  <div class="scrim"></div>
  <div class="grain"></div>
  <div class="kicker"><b id="kicker">PINK MEDIA</b></div>
  <div class="scene scene1"><h1 id="hookH"></h1><span class="sticker" id="hookSticker">HOT TAKE</span></div>
  <div class="scene scene2"><span class="eb" id="punchEb"></span><h2 id="punchH"></h2></div>
  <div class="scene scene3"><div class="swipe" id="swipe">החליקו לקרוסלה</div><div class="arrow">←</div><div class="handle" id="handle">@bankhaltershay</div></div>
  <div class="footbar"><span class="dot"></span><span class="b">PINK MEDIA · שיווק דיגיטלי</span></div>
  <div class="frame"></div>
</div>
<script>
  (function(){
    var D=JSON.parse(document.getElementById('data').textContent);
    var THEMES=['t-ink','t-cream','t-acid','t-blue','t-sun','t-grape','t-fire','t-cobalt','t-gold'];
    var theme=THEMES.indexOf(D.theme)>=0?D.theme:'t-blue';
    document.body.className=theme;
    if(D.lang==='en'){document.documentElement.setAttribute('dir','ltr');document.documentElement.setAttribute('lang','en');
      document.querySelector('.scene3 .arrow').textContent='→';}
    var img=document.querySelector('.bg .img');
    if(D.bg) img.style.backgroundImage="url('"+D.bg+"')"; else img.style.background='var(--base)';
    document.getElementById('kicker').textContent=D.kicker||'PINK MEDIA';
    // hookH and punchH come straight from the model's slide headlines, which may
    // contain a <mark> highlight wrapper (same contract as carousel.html). Use
    // innerHTML so the highlight renders instead of showing tags as literal text.
    document.getElementById('hookH').innerHTML=D.hookH||'';
    document.getElementById('hookSticker').textContent=D.hookSticker||'HOT TAKE';
    document.getElementById('punchEb').textContent=D.punchEb||'';
    document.getElementById('punchH').innerHTML=D.punchH||'';
    document.getElementById('swipe').textContent=D.swipe||(D.lang==='en'?'SWIPE FOR MORE':'החליקו לקרוסלה');
    document.getElementById('handle').textContent=D.handle||'@bankhaltershay';
    // fit headlines so long Hebrew never clips
    function fit(sel,minPx){
      var el=document.querySelector(sel); if(!el) return;
      var parent=el.parentElement; var sz=parseFloat(getComputedStyle(el).fontSize), g=0;
      while(g++<200 && sz>minPx && (el.scrollWidth>parent.clientWidth-10 || el.scrollHeight>parent.clientHeight-220)){ sz-=4; el.style.fontSize=sz+'px'; }
    }
    if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){fit('.scene1 h1',60);fit('.scene2 h2',50);});}
    else{setTimeout(function(){fit('.scene1 h1',60);fit('.scene2 h2',50);},120);}
  })();
</script>
</body>
</html>
